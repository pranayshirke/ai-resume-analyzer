{% extends "base.html" %}

{% block title %}Login{% endblock %}

{% block content %}

<section class="min-vh-100 d-flex align-items-center" style="background:linear-gradient(135deg,#2563eb,#0f172a);">

    <div class="container">

        <div class="row justify-content-center">

            <div class="col-lg-5 col-md-7">

                <div class="card shadow-lg border-0 rounded-4">

                    <div class="card-body p-5">

                        <div class="text-center mb-4">

                            <i class="bi bi-person-circle display-1 text-primary"></i>

                            <h2 class="fw-bold mt-3">
                                Welcome Back
                            </h2>

                            <p class="text-muted">
                                Login to continue using AI Resume Analyzer
                            </p>

                        </div>

                        {% if messages %}
                            {% for message in messages %}
                                <div class="alert alert-danger">
                                    {{ message }}
                                </div>
                            {% endfor %}
                        {% endif %}

                        <form method="POST">

                            {% csrf_token %}

                            <div class="mb-3">

                                <label class="form-label fw-semibold">
                                    Username
                                </label>

                                <input
                                    type="text"
                                    name="username"
                                    class="form-control form-control-lg"
                                    placeholder="Enter Username"
                                    required>

                            </div>

                            <div class="mb-4">

                                <label class="form-label fw-semibold">
                                    Password
                                </label>

                                <input
                                    type="password"
                                    name="password"
                                    class="form-control form-control-lg"
                                    placeholder="Enter Password"
                                    required>

                            </div>

                            <button class="btn btn-primary btn-lg w-100">

                                <i class="bi bi-box-arrow-in-right"></i>

                                Login

                            </button>

                        </form>

                        <hr class="my-4">

                        <div class="text-center">

                            <p class="mb-0">

                                Don't have an account?

                                <a href="{% url 'register' %}" class="fw-bold text-decoration-none">

                                    Register Here

                                </a>

                            </p>

                        </div>

                    </div>

                </div>

            </div>

        </div>

    </div>

</section>

{% endblock %}
